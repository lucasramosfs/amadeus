<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinador de Acordes</title>
<style>
  :root,[data-theme="dark"]{
    --bg:#0f0f15;--bg2:#1a1a24;--bg3:#222230;
    --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
    --text:#f0f0f4;--text2:#9090b0;
    --accent:#7c71e8;--accent2:#5248c0;--orange:#d85a30;--amber:#ba7517;
    --staff-bg:#1e1b38;--pill-bg:#2a2550;--pill-text:#a9a2f2;
    --staff-line:rgba(150,140,240,0.4);--staff-clef:rgba(154,145,240,0.45);
  }
  [data-theme="light"]{
    --bg:#f4f3fb;--bg2:#ffffff;--bg3:#ededf7;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --text:#1a1a2e;--text2:#606088;
    --accent:#534AB7;--accent2:#3C3489;--orange:#D85A30;--amber:#BA7517;
    --staff-bg:#F0EEFF;--pill-bg:#EEEDFE;--pill-text:#3C3489;
    --staff-line:rgba(83,74,183,0.35);--staff-clef:rgba(83,74,183,0.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;flex-direction:column;
    padding:1.4rem 1rem 0;transition:background .25s,color .25s;
  }
  #app{max-width:620px;width:100%;margin:0 auto;flex:1;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
  .topbar-left{display:flex;align-items:center;gap:8px}
  h1{font-size:20px;font-weight:500}
  .theme-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;transition:background .15s}
  .theme-btn:hover{background:var(--bg3)}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:.8rem;transition:background .25s,border-color .25s}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.55rem}
  .row:last-child{margin-bottom:0}
  label{font-size:13px;color:var(--text2);min-width:72px}
  select,input[type=number]{font-size:13px;padding:6px 9px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;cursor:pointer}
  select:focus,input[type=number]:focus{border-color:var(--accent)}
  input[type=range]{flex:1;min-width:80px;accent-color:var(--accent);cursor:pointer}
  .time-val{font-size:13px;font-weight:500;min-width:34px}
  .toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:.55rem}
  .toggle-row label{min-width:auto;font-size:13px;color:var(--text2);cursor:pointer}
  .toggle{position:relative;width:34px;height:18px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;border-radius:18px;background:var(--bg3);border:1px solid var(--border2);transition:background .2s;cursor:pointer}
  .toggle-slider:before{content:'';position:absolute;width:12px;height:12px;left:2px;top:2px;border-radius:50%;background:var(--text2);transition:transform .2s,background .2s}
  .toggle input:checked+.toggle-slider{background:var(--accent);border-color:var(--accent)}
  .toggle input:checked+.toggle-slider:before{transform:translateX(16px);background:#fff}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem}
  button{padding:7px 18px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-size:13px;cursor:pointer;transition:background .15s,transform .1s}
  button:hover{background:var(--bg3)}
  button:active{transform:scale(0.97)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{background:var(--accent2);border-color:var(--accent2)}
  button.danger{background:var(--orange);color:#fff;border-color:var(--orange)}
  button.danger:hover{background:#b34a26}
  #chord-display{text-align:center;padding:1.4rem 1rem 1rem}
  #chord-name-wrap{line-height:1;margin-bottom:.3rem;display:flex;align-items:flex-start;justify-content:center;gap:1px;flex-wrap:wrap}
  #chord-root{font-size:72px;font-weight:700;letter-spacing:-2px}
  #chord-acc{font-size:44px;font-weight:400;line-height:1.05;color:var(--accent);margin-top:6px}
  #chord-qual-sym{font-size:26px;font-weight:400;line-height:1.1;color:var(--accent);margin-top:10px;max-width:160px;word-break:break-all}
  #chord-pt{font-size:18px;color:var(--text2);margin-bottom:.2rem}
  #chord-type{font-size:14px;color:var(--text2);margin-bottom:1.2rem}
  #timer-bar-wrap{height:5px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:.4rem}
  #timer-bar{height:100%;background:var(--accent);width:100%;transition:width .1s linear,background .4s;border-radius:4px}
  #timer-num{font-size:12px;color:var(--text2);margin-bottom:1rem}
  .notes-reveal{display:none}
  .notes-reveal.show{display:block}
  #notes-list{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
  .note-pill{padding:7px 14px;border-radius:20px;font-size:20px;text-align:center;background:var(--pill-bg);color:var(--pill-text);animation:popIn .3s ease both;min-width:15%}
  .note-pill.tonic{background:var(--accent);color:#fff}
  .pill-name{font-size:18px;font-weight:700;display:block;line-height:1.2}
  .pill-role{font-size:10px;opacity:.6;display:block;margin-top:2px}
  @keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  #reveal-ring-wrap{display:flex;justify-content:center;margin-bottom:.75rem}
  #staff-outer{background:var(--staff-bg);border-radius:10px;padding:.8rem .4rem .55rem;margin-top:.1rem;border:1px solid var(--border2);transition:background .25s}
  #staff-label{font-size:11px;color:var(--accent);margin-bottom:.35rem;opacity:.7;letter-spacing:.4px}
  #staff-svg{width:100%}
  footer{text-align:center;padding:.9rem 1rem 1rem;font-size:11px;color:var(--text2);opacity:.55;margin-top:auto}
  @media(max-width:440px){#chord-root{font-size:56px}label{min-width:60px}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:22px">&#127927;</span>
      <h1>Treinador de Acordes</h1>
    </div>
    <button class="theme-btn" id="theme-btn">&#9728;&#65039; Claro</button>
  </div>

  <div class="card">
    <div class="row">
      <label>Tempo</label>
      <input type="range" id="time-range" min="1" max="60" value="5" step="1">
      <span class="time-val" id="time-label">5s</span>
      <input type="number" id="time-input" min="1" max="600" value="5" style="width:64px">
    </div>
    <div class="row" id="root-filter-row">
      <label>Nota</label>
      <select id="root-filter">
        <option value="all">Todas as notas</option>
        <option value="C">C &mdash; D&oacute;</option>
        <option value="C#">C&sharp; &mdash; D&oacute;&sharp;</option>
        <option value="Cb">Cb &mdash; D&oacute;b</option>
        <option value="D">D &mdash; R&eacute;</option>
        <option value="D#">D&sharp; &mdash; R&eacute;&sharp;</option>
        <option value="Db">Db &mdash; R&eacute;b</option>
        <option value="E">E &mdash; Mi</option>
        <option value="E#">E&sharp; &mdash; Mi&sharp;</option>
        <option value="Eb">Eb &mdash; Mib</option>
        <option value="F">F &mdash; F&aacute;</option>
        <option value="F#">F&sharp; &mdash; F&aacute;&sharp;</option>
        <option value="Fb">Fb &mdash; F&aacute;b</option>
        <option value="G">G &mdash; Sol</option>
        <option value="G#">G&sharp; &mdash; Sol&sharp;</option>
        <option value="Gb">Gb &mdash; Solb</option>
        <option value="A">A &mdash; L&aacute;</option>
        <option value="A#">A&sharp; &mdash; L&aacute;&sharp;</option>
        <option value="Ab">Ab &mdash; L&aacute;b</option>
        <option value="B">B &mdash; Si</option>
        <option value="B#">B&sharp; &mdash; Si&sharp;</option>
        <option value="Bb">Bb &mdash; Sib</option>
      </select>
    </div>
    <div class="row">
      <label>Fam&iacute;lia</label>
      <select id="mode-select">
        <option value="all">Todas as fam&iacute;lias</option>
        <option value="triads">Tr&iacute;ades (maior + menor)</option>
        <option value="major_group">Fam&iacute;lia Maior</option>
        <option value="minor_group">Fam&iacute;lia Menor</option>
        <option value="dom_group">Fam&iacute;lia Dominante</option>
        <option value="dim_group">Fam&iacute;lia Diminu&iacute;da</option>
        <option value="aug_group">Fam&iacute;lia Aumentada</option>
        <option value="sus_group">Suspensas</option>
        <option value="power">Power Chords (5ª)</option>
        <option value="sixth_group">Acordes de 6&ordf;</option>
        <option value="sevenths">Todas com 7&ordf;</option>
        <option value="ninths">Todas com 9&ordf;</option>
        <option value="elevenths">Todas com 11&ordf;</option>
        <option value="thirteenths">Todas com 13&ordf;</option>
        <option value="manual">Manual</option>
      </select>
    </div>
    <div id="seventh-row" class="toggle-row" style="display:none">
      <label class="toggle">
        <input type="checkbox" id="with-seventh">
        <span class="toggle-slider"></span>
      </label>
      <label for="with-seventh" style="cursor:pointer">Incluir 7&ordf; e extens&otilde;es</label>
    </div>
    <div id="manual-row" class="row" style="display:none">
      <label>Acorde</label>
      <select id="manual-root-select"></select>
      <select id="manual-qual-select"></select>
    </div>
    <div class="btn-row">
      <button class="primary" id="btn-play">&#9654; Iniciar</button>
      <button id="btn-pause" style="display:none">&#9208; Pausar</button>
      <button class="danger" id="btn-stop" style="display:none">&#9632; Encerrar</button>
    </div>
  </div>

  <div class="card" id="chord-display" style="display:none">
    <div id="chord-name-wrap">
      <span id="chord-root">&#8211;</span>
      <span id="chord-acc"></span>
      <span id="chord-qual-sym"></span>
    </div>
    <div id="chord-pt"></div>
    <div id="chord-type"></div>
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    <div id="timer-num"></div>
    <div class="notes-reveal" id="notes-reveal">
      <p style="font-size:12px;color:var(--text2);margin-bottom:.6rem">Composi&ccedil;&atilde;o do acorde:</p>
      <div id="notes-list"></div>
      <div id="reveal-ring-wrap">
        <svg id="ring-svg" width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--border2)" stroke-width="4"/>
          <circle id="ring-arc" cx="28" cy="28" r="22" fill="none"
            stroke="var(--accent)" stroke-width="4"
            stroke-dasharray="138.2" stroke-dashoffset="0"
            stroke-linecap="round" transform="rotate(-90 28 28)"
            style="transition:stroke-dashoffset .1s linear,stroke .4s"/>
          <text id="ring-txt" x="28" y="33" text-anchor="middle"
            font-size="13" font-weight="600" fill="var(--accent)">&#8211;</text>
        </svg>
      </div>
      <div id="staff-outer">
        <div id="staff-label">Pentagrama</div>
        <svg id="staff-svg" viewBox="0 0 420 100"></svg>
      </div>
    </div>
  </div>
</div>

<footer>
  &#127927; Criado por <strong>Lucas Ramos Fernandes</strong> &nbsp;&middot;&nbsp;
  &copy; <span id="yr"></span> Todos os direitos reservados
</footer>

/* ── Exibição de notas: letra + acidente ── */
function parseNote(n){
  // retorna {root, acc, pt}
  const PT = {
    'C':'Dó','C#':'Dó♯','Cb':'Dób',
    'D':'Ré','D#':'Ré♯','Db':'Réb',
    'E':'Mi','E#':'Mi♯','Eb':'Mib',
    'F':'Fá','F#':'Fá♯','Fb':'Fáb',
    'G':'Sol','G#':'Sol♯','Gb':'Solb',
    'A':'Lá','A#':'Lá♯','Ab':'Láb',
    'B':'Si','B#':'Si♯','Bb':'Sib',
  };
  const acc = n.length>1 ? (n[1]==='#'?'♯':'♭') : '';
  const root = n[0];
  return {root, acc, pt: PT[n]||n};
}

/* ── Posição Y no pentagrama (clave de Sol)
   Linhas do SVG: 20,33,46,59,72  (espaçamento 13px)
   Referência: E4=linha inferior(72), cada grau sobe 6.5px
   Linhas:  E4=72  G4=59  B4=46  D5=33  F5=20
   Espaços: F4=65.5 A4=52.5 C5=39.5 E5=26.5
──────────────────────────────────────────── */
const S = 6.5; // meio-espaço
const BASE_E = 72;
const NOTE_Y_MAP = {
  // oitava 4 (dentro do pentagrama)
  'E': BASE_E,          'E#': BASE_E,        'Eb': BASE_E,
  'F': BASE_E - S,      'F#': BASE_E - S,    'Fb': BASE_E - S,
  'G': BASE_E - S*2,    'G#': BASE_E - S*2,  'Gb': BASE_E - S*2,
  'A': BASE_E - S*3,    'A#': BASE_E - S*3,  'Ab': BASE_E - S*3,
  'B': BASE_E - S*4,    'B#': BASE_E - S*4,  'Bb': BASE_E - S*4,
  'C': BASE_E - S*5,    'C#': BASE_E - S*5,  'Cb': BASE_E - S*5,
  'D': BASE_E - S*6,    'D#': BASE_E - S*6,  'Db': BASE_E - S*6,
};

/* ── Escolher acorde ── */
function pickChord(){
  const mode=$('mode-select').value;
  if(mode==='manual'){
    const r=manualRootSel.value;
    const q=manualQualSel.value;
    const key=r+q;
    return CHORD_NOTES[key]?key:r; // fallback para maior
  }

  // filtro de raiz
  const rootFilter=$('root-filter').value;
  let roots = rootFilter==='all' ? ALL_ROOTS : [rootFilter];

  const grp=FAMILY[mode]||FAMILY.all;
  const withExt=$('with-seventh').checked;
  let suffs=[...grp.base];
  if(withExt) suffs=[...suffs,...grp.ext];
  if(!suffs.length) suffs=[...grp.base,...grp.ext];

  // filtrar só chaves que existem no banco
  let pool=[];
  roots.forEach(r=>{
    suffs.forEach(s=>{
      const k=r+s;
      if(CHORD_NOTES[k]) pool.push(k);
    });
  });
  if(!pool.length) pool=Object.keys(CHORD_NOTES);
  return pool[Math.floor(Math.random()*pool.length)];
}

/* ── Pentagrama ── */
function drawStaff(notes){
  const svg=$('staff-svg');svg.innerHTML='';
  if(!notes||!notes.length)return;
  const mL=42, sp=46;
  const lc=isDark?'rgba(150,140,240,0.4)':'rgba(83,74,183,0.35)';
  const nc=isDark
    ?['#9a91f0','#1d9e75','#e07050','#d4537e','#e09530','#60b0f0','#c0a0e0']
    :['#534AB7','#0F6E56','#993C1D','#993556','#854F0B','#1a6aaa','#7040a0'];
  const cc=isDark?'rgba(154,145,240,0.45)':'rgba(83,74,183,0.4)';

  function el(tag,attrs,txt){
    const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
    Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
    if(txt!==undefined)e.textContent=txt;
    return e;
  }

  // 5 linhas do pentagrama: E4 G4 B4 D5 F5
  const STAFF_LINES=[72,59,46,33,20];
  STAFF_LINES.forEach(y=>
    svg.appendChild(el('line',{x1:mL-4,y1:y,x2:415,y2:y,stroke:lc,'stroke-width':'1.2'}))
  );

  notes.forEach((n,i)=>{
    const x = mL+24+i*sp;
    const noteLetter = n[0]; // primeira letra para busca no mapa
    const y = NOTE_Y_MAP[n] ?? NOTE_Y_MAP[noteLetter] ?? 46;
    const c = nc[i%nc.length];
    const d = parseNote(n);

    // Linha extra abaixo (C4 = linha abaixo do pentagrama, y > 72)
    if(y >= 78){
      svg.appendChild(el('line',{x1:x-12,y1:Math.round(y),x2:x+12,y2:Math.round(y),stroke:lc,'stroke-width':'1.2'}));
    }
    // Linha extra acima (se nota ficar muito acima da 1ª linha, y < 20)
    if(y <= 14){
      svg.appendChild(el('line',{x1:x-12,y1:Math.round(y),x2:x+12,y2:Math.round(y),stroke:lc,'stroke-width':'1.2'}));
    }

    // Cabeça da nota
    svg.appendChild(el('ellipse',{cx:x,cy:y,rx:9,ry:6.5,fill:c}));

    // Haste (sobe para notas na metade inferior, desce para superior)
    const stemDir = y >= 46 ? -1 : 1;
    const stemX   = stemDir===-1 ? x+8 : x-8;
    svg.appendChild(el('line',{
      x1:stemX,y1:y,x2:stemX,y2:y+stemDir*28,
      stroke:c,'stroke-width':'1.5'
    }));

    // Acidente (♯ ou ♭) à esquerda da cabeça
    if(d.acc){
      svg.appendChild(el('text',{
        x:x-16,y:y+5,
        'text-anchor':'middle','font-size':'14','font-weight':'700',fill:c
      },d.acc));
    }

    // Nome da nota abaixo — sempre fora do pentagrama
    const labelY = Math.max(y, 72) + 16;
    svg.appendChild(el('text',{
      x,y:labelY,
      'text-anchor':'middle','font-size':'11','font-weight':'700',fill:c
    },n));
  });

  // Clave de Sol
  svg.appendChild(el('text',{x:mL-26,y:64,'font-size':'48',fill:cc},'𝄞'));
}

/* ── Exibir acorde ── */
function showChord(chordKey){
  currentChord=chordKey;
  // separar raiz do sufixo
  let root=chordKey[0];
  if(chordKey.length>1&&(chordKey[1]==='#'||chordKey[1]==='b')) root=chordKey.slice(0,2);
  const suf=chordKey.slice(root.length);
  const d=parseNote(root);

  $('chord-root').textContent=d.root;
  $('chord-acc').textContent=d.acc;
  $('chord-qual-sym').textContent=suf||'';
  $('chord-pt').textContent=d.pt+(suf?' '+suf:'');
  $('chord-type').textContent=QUAL_LABEL[suf]||suf||'Maior';

  $('notes-reveal').classList.remove('show');
  $('chord-display').style.display='block';
  $('timer-bar').style.width='100%';
  $('timer-bar').style.background='var(--accent)';
  $('ring-arc').style.strokeDashoffset='0';
  $('ring-arc').style.stroke='var(--accent)';
  $('ring-txt').textContent='–';
}

/* ── Timer A: prática ── */
function startLearnTimer(){
  totalTime=Math.max(1,parseInt($('time-input').value)||5);
  remainA=totalTime;updateLearnBar(remainA);
  clearInterval(timerA);
  timerA=setInterval(()=>{
    remainA-=0.1;updateLearnBar(remainA);
    if(remainA<=0){clearInterval(timerA);$('timer-num').textContent='';revealAndStartRevealTimer();}
  },100);
}
function updateLearnBar(r){
  const pct=Math.max(0,r/totalTime)*100;
  $('timer-bar').style.width=pct+'%';
  $('timer-num').textContent=Math.ceil(Math.max(0,r))+'s';
  if(r<=totalTime*0.4)$('timer-bar').style.background='var(--orange)';
  else if(r<=totalTime*0.6)$('timer-bar').style.background='var(--amber)';
}

/* ── Reveal + Timer B ── */
function revealAndStartRevealTimer(){
  const notes=CHORD_NOTES[currentChord]||[];
  const nl=$('notes-list');nl.innerHTML='';
  const roles=['T','3ª','5ª','7ª','9ª','11ª','13ª'];
  notes.forEach((n,i)=>{
    const d=parseNote(n);
    const pill=document.createElement('div');
    pill.className='note-pill'+(i===0?' tonic':'');
    pill.style.animationDelay=(i*0.07)+'s';
    const nameHtml=d.root+(d.acc?'<span style="font-size:.75em">'+d.acc+'</span>':'');
    pill.innerHTML='<span class="pill-name">'+nameHtml+'</span><span class="pill-role">'+roles[i]+'</span>';
    nl.appendChild(pill);
  });
  drawStaff(notes);
  $('notes-reveal').classList.add('show');
  revealTime=5;remainB=revealTime;updateRing(remainB);
  clearInterval(timerB);
  timerB=setInterval(()=>{
    remainB-=0.1;updateRing(remainB);
    if(remainB<=0){clearInterval(timerB);if(running&&!paused)nextChord();}
  },100);
}
function updateRing(r){
  const pct=Math.max(0,r/revealTime);
  $('ring-arc').style.strokeDashoffset=CIRC*(1-pct);
  $('ring-txt').textContent=Math.ceil(Math.max(0,r));
  if(r<=revealTime*0.4)$('ring-arc').style.stroke='var(--orange)';
  else if(r<=revealTime*0.6)$('ring-arc').style.stroke='var(--amber)';
  else $('ring-arc').style.stroke='var(--accent)';
}
function nextChord(){showChord(pickChord());startLearnTimer();}

/* ── Pausar ── */
$('btn-pause').onclick=function(){
  if(!paused){
    paused=true;clearInterval(timerA);clearInterval(timerB);
    this.textContent='▶ Continuar';
  } else {
    paused=false;this.textContent='⏸ Pausar';
    if($('notes-reveal').classList.contains('show')){
      timerB=setInterval(()=>{remainB-=0.1;updateRing(remainB);if(remainB<=0){clearInterval(timerB);if(running)nextChord();}},100);
    } else {
      timerA=setInterval(()=>{remainA-=0.1;updateLearnBar(remainA);if(remainA<=0){clearInterval(timerA);revealAndStartRevealTimer();}},100);
    }
  }
};

/* ── Iniciar / Encerrar ── */
$('btn-play').onclick=function(){
  running=true;paused=false;
  this.style.display='none';
  $('btn-pause').style.display='';
  $('btn-stop').style.display='';
  $('btn-pause').textContent='⏸ Pausar';
  nextChord();
};
$('btn-stop').onclick=function(){
  running=false;paused=false;
  clearInterval(timerA);clearInterval(timerB);
  $('chord-display').style.display='none';
  $('btn-play').style.display='';
  $('btn-pause').style.display='none';
  this.style.display='none';
};
</script>
</body>
